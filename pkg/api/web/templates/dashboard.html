{{define "content"}}
<section class="toolbar">
  <button class="btn primary" id="scan-btn" onclick="lh.scan()">Scan now</button>
  <span id="scan-status" class="muted"></span>
</section>

<div id="status" hx-get="/ui/status" hx-trigger="every 10s, refresh from:body" hx-swap="innerHTML">{{template "statusCards" .Status}}</div>

<h2>Watched containers</h2>
<div id="containers" hx-get="/ui/containers" hx-trigger="refresh from:body" hx-swap="innerHTML">{{template "containersTable" .}}</div>

<h2>Live log</h2>
<pre id="log" class="log" aria-live="polite"></pre>

<h2>Settings</h2>
<div id="settings">{{template "settingsForm" .}}</div>

<h2>Recent sessions</h2>
<div id="history" hx-get="/ui/history" hx-trigger="refresh from:body" hx-swap="innerHTML">{{template "historyList" .Sessions}}</div>
{{end}}
